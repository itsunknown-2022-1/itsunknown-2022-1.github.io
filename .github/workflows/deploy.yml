name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Change to your default branch name if different

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ itsunknown-2022-1.github.io }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build # This creates your subfolder (e.g., /dist)

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './artifacts/fb-downloader' # CHANGE THIS to your exact subfolder name (e.g., ./build, ./out)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
